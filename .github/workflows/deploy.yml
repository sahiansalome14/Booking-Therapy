name: Despliegue Continuo a AWS Academy EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Desplegar en EC2
    runs-on: ubuntu-latest

    steps:
    - name: Conectar a EC2, actualizar código y reiniciar Docker Compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "========================================="
          echo "🚀 Iniciando Despliegue en AWS EC2..."
          echo "========================================="

          # 1. Asegurar que el plugin docker-buildx esté instalado en Amazon Linux
          if [ ! -f "/usr/local/lib/docker/cli-plugins/docker-buildx" ]; then
            echo "📦 Instalando plugin Docker Buildx (Requerido por Docker Compose)..."
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.19.1/buildx-v0.19.1.linux-amd64 -o /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
          fi

          # 2. Crear directorio de la aplicación si no existe
          mkdir -p $HOME/app
          cd $HOME/app

          # 3. Inicializar git si es la primera vez
          if [ ! -d ".git" ]; then
            echo "📦 Inicializando repositorio Git por primera vez..."
            git init
            git branch -m main
            git remote add origin https://github.com/${{ github.repository }}.git
          fi

          # 4. Descargar los últimos cambios de la rama main
          echo "📥 Descargando últimos cambios desde GitHub..."
          git fetch origin main
          git reset --hard origin/main

          # 5. Generar archivos .env de producción de forma segura usando GitHub Secrets
          echo "⚙️ Configurando archivos de entorno (.env) de forma segura..."

          # Archivo .env raíz (Para inyectar a Vite en Docker Compose)
          echo "VITE_BACKEND_URL=http://${{ secrets.EC2_HOST }}" > .env
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

          # Archivo frontend/.env
          echo "VITE_BACKEND_URL=http://${{ secrets.EC2_HOST }}" > frontend/.env
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> frontend/.env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> frontend/.env

          # Archivo backend/.env
          echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" > backend/.env
          echo "DEBUG=True" >> backend/.env
          echo "ALLOWED_HOSTS=127.0.0.1,localhost,${{ secrets.EC2_HOST }}" >> backend/.env
          echo "DATABASE_URL=postgresql://vis_user:secret@db:5432/vis_vitalis_db" >> backend/.env
          echo "CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost,http://${{ secrets.EC2_HOST }},http://${{ secrets.EC2_HOST }}:3000,http://${{ secrets.EC2_HOST }}:80" >> backend/.env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> backend/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> backend/.env
          echo "REDIS_HOST=redis" >> backend/.env
          echo "DJANGO_SETTINGS_MODULE=config.settings" >> backend/.env

          # 6. Construir y levantar contenedores con Docker Compose
          echo "🐳 Ejecutando Docker Compose (reconstrucción completa)..."
          docker compose build --no-cache
          docker compose up -d

          echo "⏳ Esperando arranque del backend Django..."
          sleep 25
          docker compose ps
          docker compose logs backend --tail 40

          # Reiniciar Nginx para refrescar la resolución DNS interna de Docker
          echo "🔄 Reiniciando Nginx para actualizar resolución DNS interna..."
          docker compose restart nginx

          # 7. Limpiar imágenes antiguas para liberar espacio en disco
          echo "🧹 Limpiando imágenes de Docker sin uso..."
          docker image prune -f

          echo "========================================="
          echo "✅ ¡Despliegue completado con éxito!"
          echo "========================================="
