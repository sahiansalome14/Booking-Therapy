<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title mb-4">Reservar Sesión</h3>
                        <form id="reservaForm" method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="terapeuta" class="form-label">Terapeuta</label>
                                <input type="text" class="form-control" id="terapeuta" name="terapeuta" placeholder="Nombre del terapeuta" required>
                            </div>
                            <div class="mb-3">
                                <label for="slot" class="form-label">Slot (disponible)</label>
                                <input type="text" class="form-control" id="slot" name="slot" placeholder="True o False" required>
                                <div class="form-text">Ingresa "True" si está disponible.</div>
                            </div>
                            <div class="mb-3">
                                <label for="tipo" class="form-label">Tipo de Sesión</label>
                                <input type="text" class="form-control" id="tipo" name="tipo" placeholder="Masaje, Acupuntura..." required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Reservar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
