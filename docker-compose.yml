#  Docker Compose — Vis Vitalis / Booking-Therapy
#  Arquitectura: Strangler Pattern (Modularized & Event-Driven)
#
#  Servicios:
#    db               → PostgreSQL (Base de datos del monolito: vis_vitalis_db)
#    agenda-db        → PostgreSQL (Base de datos aislada para Agenda: vis_agenda_db)
#    payments-db      → PostgreSQL (Base de datos aislada para Pagos: vis_payments_db)
#    redis            → Message Broker (PubSub/Colas para EDA)
#    backend          → Monolito Django  (API v1 - Publicador de Eventos)
#    payments-service → Microservicio Flask (API v2 - Pagos)
#    payments-consumer→ Consumidor Redis asíncrono para Pagos
#    agenda-service   → Microservicio Flask (API v2 - Agenda)
#    agenda-consumer  → Consumidor Redis asíncrono para Agenda
#    nginx            → Proxy inverso
#    frontend         → Aplicación React/Vite

services:

  # ── Base de datos PostgreSQL para el Monolito ──────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: vis_vitalis_db
      POSTGRES_USER: vis_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Base de datos aislada para el Microservicio de Agenda (Database-per-Service) ──
  agenda-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: vis_agenda_db
      POSTGRES_USER: vis_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_agenda_data:/var/lib/postgresql/data

  # ── Base de datos aislada para el Microservicio de Pagos (Database-per-Service) ──
  payments-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: vis_payments_db
      POSTGRES_USER: vis_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_payments_data:/var/lib/postgresql/data

  # ── Redis (Message Broker para EDA) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # ── Monolito Django (API v1 — Publicador de Eventos) ──────────────────────
  backend:
    build:
      context: ./backend
    restart: always
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120"
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgresql://vis_user:secret@db:5432/vis_vitalis_db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Celery Worker (Procesos de Fondo: Notificaciones y Reportes) ───────────
  celery-worker:
    build:
      context: ./backend
    restart: always
    command: sh -c "python wait_for_db.py && celery -A config worker --loglevel=info"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://vis_user:secret@db:5432/vis_vitalis_db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  # ── Microservicio Flask — Pagos (API v2) ───────────────────────────────────
  payments-service:
    build:
      context: ./payments-service
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vis_user:secret@payments-db:5432/vis_payments_db
      - REDIS_HOST=redis
    depends_on:
      - payments-db
      - redis
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v2/payments/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Consumidor Asíncrono de Eventos para Pagos (EDA worker) ────────────────
  payments-consumer:
    build:
      context: ./payments-service
    restart: always
    command: python infrastructure/event_consumer.py
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vis_user:secret@payments-db:5432/vis_payments_db
      - REDIS_HOST=redis
    depends_on:
      - payments-db
      - redis

  # ── Microservicio Flask — Agenda (API v2) ──────────────────────────────────
  agenda-service:
    build:
      context: ./agenda-service
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vis_user:secret@agenda-db:5432/vis_agenda_db
      - PAYMENTS_SERVICE_URL=http://payments-service:5000
      - REDIS_HOST=redis
    depends_on:
      - agenda-db
      - payments-service
      - redis
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/v2/agenda/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Consumidor Asíncrono de Eventos para Agenda (EDA worker) ───────────────
  agenda-consumer:
    build:
      context: ./agenda-service
    restart: always
    command: python infrastructure/event_consumer.py
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vis_user:secret@agenda-db:5432/vis_agenda_db
      - REDIS_HOST=redis
    depends_on:
      - agenda-db
      - redis

  # ── Nginx — Orquestador de Tráfico ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
      payments-service:
        condition: service_started
      agenda-service:
        condition: service_started

  # ── Frontend React/Vite ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    env_file:
      - ./frontend/.env
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - nginx

# ── Volúmenes persistentes ────────────────────────────────────────────────
volumes:
  postgres_data:
  postgres_agenda_data:
  postgres_payments_data:
