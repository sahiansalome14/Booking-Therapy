events {
    worker_connections 1024;
}

http {
    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── Upstream: Monolito Django ─────────────────────────────────────────────
    upstream django_backend {
        server backend:8000;
    }

    # ── Upstream: Microservicio Flask (Pagos v2) ──────────────────────────────
    upstream flask_payments {
        server payments-service:5000;
    }

    # ── Upstream: Microservicio Flask (Agenda v2) ─────────────────────────────
    upstream flask_agenda {
        server agenda-service:5001;
    }

    server {
        listen 80;
        server_name _;

        # ── Cabeceras comunes para proxying ───────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ──────────────────────────────────────────────────────────────────────
        #  v2/agenda → Microservicio Flask Agenda (ruta ESTRANGULADA)
        #  Debe ir antes de /api/v2/ para que nginx use el prefijo más largo.
        # ──────────────────────────────────────────────────────────────────────
        location /api/v2/agenda/ {
            proxy_pass http://flask_agenda;
        }

        # ──────────────────────────────────────────────────────────────────────
        #  v2 → Microservicio Flask Pagos (ruta ESTRANGULADA)
        # ──────────────────────────────────────────────────────────────────────
        location /api/v2/ {
            proxy_pass http://flask_payments;
        }

        # ──────────────────────────────────────────────────────────────────────
        #  v1 → Monolito Django (rutas heredadas)
        # ──────────────────────────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://django_backend;
        }

        # ──────────────────────────────────────────────────────────────────────
        #  Administración Django
        # ──────────────────────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://django_backend;
        }

        # ──────────────────────────────────────────────────────────────────────
        #  Frontend (React/Vite — servido por el propio contenedor)
        #  Cualquier ruta no reconocida por la API se deja pasar al frontend.
        # ──────────────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://django_backend;
        }
    }
}
